# Everforest Dark prompt tuned for Nerd Font terminals and fast redraws.
add_newline = true
command_timeout = 500
scan_timeout = 30
palette = "everforest_dark"

format = """
${custom.symbol}\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
${custom.git_status_trimmed}\
$nodejs\
$python\
$ruby\
$rust\
$golang\
$java\
$terraform\
$line_break\
$character"""

right_format = """$cmd_duration$jobs$status$time"""

[palettes.everforest_dark]
bg0 = "#272e33"
bg1 = "#2e383c"
bg3 = "#414b50"
fg = "#d3c6aa"
fg_dim = "#9da9a0"
red = "#e67e80"
orange = "#e69875"
yellow = "#dbbc7f"
green = "#a7c080"
aqua = "#83c092"
blue = "#7fbbb3"
purple = "#d699b6"

[custom.symbol]
command = "printf ï†…"
when = true
shell = ["bash", "--noprofile", "--norc"]
style = "fg:yellow bold"
format = "[$output]($style) "

[username]
show_always = false
style_user = "fg:fg_dim"
style_root = "fg:red bold"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "fg:yellow bold"
format = "on [$hostname]($style) "

[directory]
style = "fg:fg bg:bg1 bold"
read_only = " ï€£"
read_only_style = "fg:red bg:bg1 bold"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = ""
fish_style_pwd_dir_length = 1
format = "[î‚¶](fg:bg1)[ïپ¼ $path$read_only]($style)[î‚´](fg:bg1) "

[directory.substitutions]
"~/Dev/github.com" = "îœ‚ github"
"~/Dev" = "َ°²‹ Dev"
"~/Desktop" = "ï„ˆ Desktop"
"~/Documents" = "ï…› Documents"
"~/Downloads" = "ï€™ Downloads"
"~" = "ï€•"

[git_branch]
symbol = "ïگک"
style = "fg:aqua bg:bg1 bold"
truncation_length = 32
format = "[î‚¶](fg:bg1)[$symbol $branch]($style)[î‚´](fg:bg1) "

[git_state]
style = "fg:orange bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$state( $progress_current/$progress_total)]($style)[î‚´](fg:bg1) "
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_status]
style = "fg:yellow bg:bg1 bold"
format = "([î‚¶](fg:bg1)[$all_status$ahead_behind]($style)[î‚´](fg:bg1) )"
ignore_submodules = true
conflicted = "َ°³¤ ${count} "
ahead = "â‡،${count} "
behind = "â‡£${count} "
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count} "
untracked = "ïپ™ ${count} "
stashed = "َ°ڈ— ${count} "
modified = "َ°·‰ ${count} "
staged = "+ ${count} "
renamed = "َ°‘• ${count} "
deleted = "âˆ’ ${count} "
typechanged = "َ°ڈ« ${count} "
up_to_date = ""

[custom.git_status_trimmed]
command = "starship module git_status | sed $'s/^[[:space:]]*//; s/[[:space:]]*\\\\x1b\\\\[0m/\\\\x1b[0m/g; s/[[:space:]]*$//'"
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
shell = ["bash", "--noprofile", "--norc"]
format = "$output"
unsafe_no_escape = true

[nodejs]
symbol = "îœک"
style = "fg:green bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = []


[python]
symbol = "îˆµ"
style = "fg:yellow bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version($virtualenv)]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = [
  "pyproject.toml",
  "requirements.txt",
  ".python-version",
  "Pipfile",
  "tox.ini",
  "setup.py",
]
detect_folders = []

[ruby]
symbol = "î‍‘"
style = "fg:red bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = ["Gemfile", ".ruby-version"]
detect_folders = []

[rust]
symbol = "î‍¨"
style = "fg:orange bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = ["Cargo.toml"]
detect_folders = []

[golang]
symbol = "îک§"
style = "fg:aqua bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = ["go.mod", "go.work", ".go-version"]
detect_folders = []

[java]
symbol = "î‰–"
style = "fg:purple bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = [
  "pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "build.sbt",
  ".java-version",
  ".sdkmanrc",
]
detect_folders = []

[terraform]
symbol = "َ±پ¢"
style = "fg:purple bg:bg1 bold"
format = "[î‚¶](fg:bg1)[$symbol $version]($style)[î‚´](fg:bg1) "
detect_extensions = []
detect_files = ["main.tf", "versions.tf", ".terraform-version"]
detect_folders = [".terraform"]

[cmd_duration]
min_time = 500
style = "fg:orange"
format = "[َ°”› $duration]($style) "

[jobs]
symbol = "ï€“"
style = "fg:purple"
format = "[$symbol $number]($style) "

[status]
disabled = false
recognize_signal_code = true
map_symbol = true
style = "fg:red bold"
format = "[îھ‡ $status]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:fg_dim"
format = "[َ°¥” $time]($style)"

[character]
success_symbol = "[â‌¯](bold fg:green)"
error_symbol = "[â‌¯](bold fg:red)"
vimcmd_symbol = "[â‌®](bold fg:yellow)"
