# Everforest Dark prompt tuned for Nerd Font terminals and fast redraws.
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 500
scan_timeout = 30
palette = "everforest_dark"

format = """
[░▒▓](fg:segment_icon)\
[ ](fg:blue bg:segment_icon bold)\
$hostname\
[](fg:segment_icon bg:segment_path)\
$directory\
[](fg:segment_path bg:segment_git)\
$git_branch\
[](fg:segment_git bg:segment_status)\
$git_state\
$git_status\
[](fg:segment_status bg:segment_runtime)\
$nodejs\
$python\
$ruby\
$rust\
$golang\
$java\
$terraform\
[](fg:segment_runtime)\
$line_break\
$character"""

right_format = """$cmd_duration$jobs$status$time"""

[palettes.everforest_dark]
crust = "#1e2326"
bg0 = "#272e33"
bg1 = "#2e383c"
bg2 = "#374145"
bg3 = "#414b50"
bg4 = "#495156"
fg = "#d3c6aa"
fg_dim = "#9da9a0"
red = "#e67e80"
orange = "#e69875"
peach = "#e69875"
yellow = "#dbbc7f"
green = "#a7c080"
aqua = "#83c092"
blue = "#7fbbb3"
purple = "#d699b6"
segment_icon = "#273f46"
segment_path = "#3a463b"
segment_git = "#263f43"
segment_status = "#4a3b2d"
segment_runtime = "#303f4a"

[username]
show_always = false
style_user = "fg:fg_dim"
style_root = "fg:red bold"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "fg:yellow bg:segment_icon bold"
format = "[ on $hostname ]($style)"

[directory]
style = "fg:fg bg:segment_path bold"
read_only = " "
read_only_style = "fg:red bg:segment_path bold"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = ""
fish_style_pwd_dir_length = 1
format = "[  $path$read_only ]($style)"

[directory.substitutions]
"~/Dev/github.com" = " github"
"~/Dev" = "󰲋 Dev"
"~/Desktop" = " Desktop"
"~/Documents" = " Documents"
"~/Downloads" = " Downloads"
"~" = ""

[git_branch]
symbol = ""
style = "fg:aqua bg:segment_git bold"
truncation_length = 32
format = "[ $symbol $branch ]($style)"

[git_state]
style = "fg:orange bg:segment_status bold"
format = "[ $state( $progress_current/$progress_total) ]($style)"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_status]
style = "fg:yellow bg:segment_status bold"
format = "([ $all_status$ahead_behind]($style))"
ignore_submodules = true
conflicted = "󰳤 ${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = " ${count} "
stashed = "󰏗 ${count} "
modified = "󰷉 ${count} "
staged = "+ ${count} "
renamed = "󰑕 ${count} "
deleted = "− ${count} "
typechanged = "󰏫 ${count} "
up_to_date = ""

[nodejs]
symbol = ""
style = "fg:green bg:segment_runtime bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = ""
style = "fg:yellow bg:segment_runtime bold"
format = "[ $symbol $version($virtualenv) ]($style)"
detect_extensions = []
detect_files = [
  "pyproject.toml",
  "requirements.txt",
  ".python-version",
  "Pipfile",
  "tox.ini",
  "setup.py",
]
detect_folders = []

[ruby]
symbol = ""
style = "fg:red bg:segment_runtime bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = ["Gemfile", ".ruby-version"]
detect_folders = []

[rust]
symbol = ""
style = "fg:orange bg:segment_runtime bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = ["Cargo.toml"]
detect_folders = []

[golang]
symbol = ""
style = "fg:aqua bg:segment_runtime bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = ["go.mod", "go.work", ".go-version"]
detect_folders = []

[java]
symbol = ""
style = "fg:purple bg:segment_runtime bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = [
  "pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "build.sbt",
  ".java-version",
  ".sdkmanrc",
]
detect_folders = []

[terraform]
symbol = "󱁢"
style = "fg:purple bg:segment_runtime bold"
format = "[ $symbol $version ]($style)"
detect_extensions = []
detect_files = ["main.tf", "versions.tf", ".terraform-version"]
detect_folders = [".terraform"]

[cmd_duration]
min_time = 500
style = "fg:orange"
format = "[󰔛 $duration]($style) "

[jobs]
symbol = ""
style = "fg:purple"
format = "[$symbol $number]($style) "

[status]
disabled = false
recognize_signal_code = true
map_symbol = true
style = "fg:red bold"
format = "[ $status]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "fg:fg_dim"
format = "[󰥔 $time]($style)"

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:yellow)"
vimcmd_replace_one_symbol = "[❮](bold fg:peach)"
vimcmd_replace_symbol = "[❮](bold fg:peach)"
vimcmd_visual_symbol = "[❮](bold fg:purple)"
